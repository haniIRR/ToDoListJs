<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>ToDoList</title>
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 p-6"
  >
    <div class="max-w-5xl mx-auto">
      <h1
        class="text-4xl font-bold text-center bg-gradient-to-r from-indigo-600 to-pink-500 text-transparent bg-clip-text mb-8"
      >
        ✨ My ToDo List
      </h1>
      <form class="bg-white/90 backdrop-blur rounded-3xl shadow-2xl p-8 mb-10">
        <input
          id="taskTitle"
          type="text"
          placeholder="What do you want to do?"
          class="w-full px-5 py-4 rounded-2xl border border-gray-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-8 text-gray-700"
        />

        <!-- Color Picker -->

        <div class="mb-8">
          <p class="font-semibold text-gray-700 mb-4">Choose Task Color 🎨</p>

          <div class="flex flex-wrap gap-4 colorSelect">
            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-red-400 shadow-md hover:scale-110 transition"
              data-color="red"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-orange-400 shadow-md hover:scale-110 transition"
              data-color="orange"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-yellow-400 shadow-md hover:scale-110 transition"
              data-color="yellow"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-lime-400 shadow-md hover:scale-110 transition"
              data-color="lime"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-green-500 shadow-md hover:scale-110 transition"
              data-color="green"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-teal-400 shadow-md hover:scale-110 transition"
              data-color="teal"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-cyan-400 shadow-md hover:scale-110 transition"
              data-color="cyan"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-blue-500 shadow-md hover:scale-110 transition"
              data-color="blue"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-indigo-500 shadow-md hover:scale-110 transition"
              data-color="indigo"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-purple-500 shadow-md hover:scale-110 transition"
              data-color="purple"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-pink-500 shadow-md hover:scale-110 transition"
              data-color="pink"
            ></button>

            <button
              type="button"
              class="color w-9 h-9 rounded-full bg-gray-700 shadow-md hover:scale-110 transition"
              data-color="gray"
            ></button>
          </div>
        </div>

        <!-- Date Time Tag -->

        <div class="grid md:grid-cols-3 gap-5 mb-8">
          <div>
            <label class="block mb-2 text-gray-600"> 📅 Choose Day </label>

            <input
              id="dayTask"
              type="date"
              class="w-full p-3 rounded-xl border focus:ring-2 focus:ring-indigo-300"
            />
          </div>

          <div>
            <label class="block mb-2 text-gray-600"> ⏰ Choose Time </label>

            <input
              id="timeTask"
              type="time"
              class="w-full p-3 rounded-xl border focus:ring-2 focus:ring-indigo-300"
            />
          </div>

          <div>
            <label class="block mb-2 text-gray-600"> 🏷 Tag </label>

            <input
              id="tagTask"
              type="text"
              placeholder="study..."
              class="w-full p-3 rounded-xl border focus:ring-2 focus:ring-indigo-300"
            />
          </div>
        </div>

        <!-- Buttons -->

        <div class="flex justify-center gap-5">
          <button
            id="addbtn"
            class="w-16 h-16 rounded-2xl bg-gradient-to-r from-indigo-500 to-purple-500 text-white text-3xl shadow-lg hover:scale-105 transition"
          >
            +
          </button>

          <button
            type="reset"
            class="px-8 rounded-2xl bg-gray-200 text-gray-700 shadow hover:bg-gray-300 transition"
          >
            Reset
          </button>
        </div>
      </form>

      <!-- Tasks Table -->

      <div class="bg-white rounded-3xl shadow-xl p-6 overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr
              class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white"
            >
              <th class="p-4 rounded-l-xl">Id</th>
              <th class="p-4">Task</th>
              <th class="p-4">Day</th>
              <th class="p-4">Time</th>
              <th class="p-4">Tag</th>
              <th class="p-4">Status</th>
              <th class="p-4">Edit</th>
              <th class="p-4 rounded-r-xl">Remove</th>
            </tr>
          </thead>

          <tbody>
            <!-- <tr class="border-b hover:bg-indigo-50 transition">
              <td class="p-4">1</td>

              <td class="p-4 font-semibold">Learn JavaScript</td>

              <td class="p-4">09 July</td>

              <td class="p-4">10:00</td>

              <td class="p-4">
                <span
                  class="px-3 py-1 rounded-full bg-purple-100 text-purple-600"
                >
                  Coding
                </span>
              </td>

              <td class="p-4">
                <span
                  class="px-3 py-1 rounded-full bg-green-100 text-green-600"
                >
                  Done
                </span>
              </td>

              <td class="p-4 text-center">✏️</td>

              <td class="p-4 text-center">🗑️</td>
            </tr> -->
          </tbody>
        </table>
      </div>

      <div class="text-center mt-8">
        <span
          class="bg-white shadow px-8 py-3 rounded-full font-semibold text-gray-700"
        >
          Total Tasks : 1
        </span>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
